name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  go-binaries:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          OUTPUT="check-templates-${GOOS}-${GOARCH}${EXT}"
          go build -o "$OUTPUT" ./cmd/check-templates

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET=$(ls check-templates-*)
          gh release upload "${{ github.event.release.tag_name }}" "$ASSET" --clobber

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build .vsix
        working-directory: vscode-go-template-check
        run: |
          npm ci
          npx @vscode/vsce package --no-git-tag-version

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VSIX=$(ls vscode-go-template-check/*.vsix)
          gh release upload "${{ github.event.release.tag_name }}" "$VSIX" --clobber
